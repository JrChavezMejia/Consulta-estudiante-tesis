<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de Estado de Tesis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071426;
      color: #ffffff;
    }

    .contenedor {
      max-width: 1060px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    h1, h2, h3 {
      color: #19d3e6;
    }

    p {
      line-height: 1.5;
      color: #d6e6f2;
    }

    .caja {
      background: #0d1f36;
      border: 1px solid #2f5c7c;
      border-radius: 8px;
      padding: 22px;
      margin-top: 22px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .tab {
      padding: 13px;
      border: 1px solid #2f5c7c;
      border-radius: 6px;
      background: #071426;
      color: #ffffff;
      font-weight: bold;
      cursor: pointer;
    }

    .tab.activo {
      background: #19d3e6;
      color: #00111f;
      border-color: #19d3e6;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #3c6d91;
      background: #071426;
      color: #ffffff;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: 0;
      border-radius: 6px;
      background: #19d3e6;
      color: #00111f;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.secundario {
      background: #ffd166;
      color: #1b1300;
    }

    button.verde {
      background: #3ddc97;
      color: #002015;
    }

    button.discreto {
      background: #12314f;
      color: #d6e6f2;
      border: 1px solid #2f5c7c;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .resultado {
      margin-top: 22px;
      padding: 18px;
      border-radius: 8px;
      background: #06111f;
      border: 1px solid #2f5c7c;
      display: none;
    }

    .error {
      border-color: #ff6b6b;
      color: #ffd6d6;
    }

    .exito {
      border-color: #3ddc97;
      color: #d8ffe9;
    }

    .dato {
      margin-bottom: 10px;
    }

    .dato strong {
      color: #19d3e6;
    }

    .trabajo {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid #2f5c7c;
      border-radius: 8px;
      background: #071426;
    }

    .trabajo-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .estado-badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #12314f;
      border: 1px solid #2f5c7c;
      color: #d6e6f2;
      font-weight: bold;
      font-size: 14px;
    }

    .estado-badge.alerta {
      background: #3b2b05;
      border-color: #ffd166;
      color: #ffe7a3;
    }

    .estado-badge.exito-badge {
      background: #06321f;
      border-color: #3ddc97;
      color: #d8ffe9;
    }

    .grid-dos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .acciones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .oculto {
      display: none;
    }

    .filtros {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .progreso {
      margin: 18px 0 20px;
      padding: 16px;
      border-radius: 8px;
      background: #06111f;
      border: 1px solid #203e5f;
    }

    .progreso-linea {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      align-items: start;
    }

    .paso {
      position: relative;
      text-align: center;
      color: #8fa6c6;
      font-size: 12px;
      line-height: 1.25;
    }

    .punto {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      margin: 0 auto 8px;
      background: #12314f;
      border: 2px solid #2f5c7c;
      box-sizing: border-box;
    }

    .paso.hecho .punto {
      background: #19d3e6;
      border-color: #19d3e6;
      box-shadow: 0 0 14px rgba(25, 211, 230, .45);
    }

    .paso.actual .punto {
      background: #ffd166;
      border-color: #ffd166;
      box-shadow: 0 0 16px rgba(255, 209, 102, .55);
    }

    .paso.final .punto {
      background: #3ddc97;
      border-color: #3ddc97;
      box-shadow: 0 0 16px rgba(61, 220, 151, .55);
    }

    .paso.hecho,
    .paso.actual,
    .paso.final {
      color: #ffffff;
      font-weight: bold;
    }

    .barra-avance {
      height: 8px;
      background: #12314f;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid #2f5c7c;
    }

    .barra-avance span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #19d3e6, #3ddc97);
      width: 0%;
    }

    a {
      color: #19d3e6;
    }

    @media (max-width: 820px) {
      .tabs, .grid-dos, .acciones, .filtros {
        grid-template-columns: 1fr;
      }

      .progreso-linea {
        grid-template-columns: 1fr;
        text-align: left;
      }

      .paso {
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
      }

      .punto {
        margin: 0;
        flex: 0 0 auto;
      }
    }
  </style>
</head>

<body>
  <div class="contenedor">
    <h1>Consulta de estado de tesis</h1>
    <p>Seleccione el tipo de acceso para continuar.</p>

    <div class="tabs">
      <button class="tab activo" id="tabEstudiante" onclick="mostrarAcceso('estudiante')">Estudiante</button>
      <button class="tab" id="tabAdmin" onclick="mostrarAcceso('admin')">Administrador</button>
    </div>

    <div id="panelEstudiante" class="caja">
      <h2>Acceso estudiante</h2>
      <p>Ingrese su ID, correo electrónico y clave de acceso.</p>

      <label for="id">ID de registro</label>
      <input id="id" type="text" placeholder="Ejemplo: TESIS-20260706091128" />

      <label for="correo">Correo electrónico</label>
      <input id="correo" type="email" placeholder="correo@ejemplo.com" />

      <label for="clave">Clave de acceso</label>
      <input id="clave" type="password" placeholder="Clave recibida por correo" />

      <button onclick="consultarEstado()">Consultar estado</button>

      <div id="resultado" class="resultado"></div>
    </div>

    <div id="panelAdmin" class="caja oculto">
      <h2>Panel de gestión de tesis</h2>
      <p>Ingrese su clave para cargar los trabajos, revisar su avance, autorizar acceso y actualizar estados.</p>

      <label for="adminClave">Clave de administrador</label>
      <input id="adminClave" type="password" placeholder="Clave de administrador" />

      <button class="secundario" onclick="listarTrabajos()">Ingresar y cargar tesis</button>

      <div class="filtros">
        <div>
          <label for="filtroEstado">Filtrar por estado</label>
          <select id="filtroEstado" onchange="pintarTrabajos()">
            <option value="">Todos</option>
            <option value="Solicitud recibida">Solicitud recibida</option>
            <option value="En evaluación inicial">En evaluación inicial</option>
            <option value="Información incompleta">Información incompleta</option>
            <option value="Aprobada para seguimiento">Aprobada para seguimiento</option>
            <option value="En revisión">En revisión</option>
            <option value="Con observaciones">Con observaciones</option>
            <option value="En espera del estudiante">En espera del estudiante</option>
            <option value="Finalizado">Finalizado</option>
          </select>
        </div>

        <div>
          <label for="filtroTexto">Buscar</label>
          <input id="filtroTexto" type="text" placeholder="Nombre, correo, título o ID" oninput="pintarTrabajos()" />
        </div>
      </div>

      <div id="resultadoAdmin" class="resultado"></div>
      <div id="listaTrabajos"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkFB4Q7q2R7UBsze7T5K9h-9rpaasMjVlV6iq4S3T-Kx-Kxd8ckeLckEO01mTK7qMKEw/exec";

    const ESTADOS = [
      "Solicitud recibida",
      "En evaluación inicial",
      "Información incompleta",
      "Aprobada para seguimiento",
      "En revisión",
      "Con observaciones",
      "En espera del estudiante",
      "Finalizado"
    ];

    const ESTADO_EQUIVALENTE = {
      "Recibido": "Solicitud recibida",
      "En revision": "En revisión",
      "En revisiÃ³n": "En revisión"
    };

    let trabajosCache = [];

    function normalizarEstado(estado) {
      const limpio = String(estado || "").trim();
      return ESTADO_EQUIVALENTE[limpio] || limpio || "Solicitud recibida";
    }

    function indiceEstado(estado) {
      const estadoNormal = normalizarEstado(estado);
      const idx = ESTADOS.indexOf(estadoNormal);
      return idx >= 0 ? idx : 0;
    }

    function crearProgreso(estado) {
      const idx = indiceEstado(estado);
      const porcentaje = Math.round((idx / (ESTADOS.length - 1)) * 100);

      return `
        <div class="progreso">
          <div class="barra-avance"><span style="width:${porcentaje}%"></span></div>
          <div class="progreso-linea">
            ${ESTADOS.map(function(nombre, i) {
              let clase = "paso";
              if (i < idx) clase += " hecho";
              if (i === idx) clase += nombre === "Finalizado" ? " final" : " actual";
              return `<div class="${clase}"><div class="punto"></div><div>${nombre}</div></div>`;
            }).join("")}
          </div>
        </div>
      `;
    }

    function badgeEstado(estado) {
      const estadoNormal = normalizarEstado(estado);
      let clase = "estado-badge";

      if (estadoNormal === "Información incompleta" || estadoNormal === "En espera del estudiante" || estadoNormal === "Con observaciones") {
        clase += " alerta";
      }

      if (estadoNormal === "Finalizado") {
        clase += " exito-badge";
      }

      return `<span class="${clase}">${estadoNormal}</span>`;
    }

    function mostrarAcceso(tipo) {
      document.getElementById("panelEstudiante").classList.toggle("oculto", tipo !== "estudiante");
      document.getElementById("panelAdmin").classList.toggle("oculto", tipo !== "admin");
      document.getElementById("tabEstudiante").classList.toggle("activo", tipo === "estudiante");
      document.getElementById("tabAdmin").classList.toggle("activo", tipo === "admin");
    }

    async function consultarEstado() {
      const id = document.getElementById("id").value.trim();
      const correo = document.getElementById("correo").value.trim();
      const clave = document.getElementById("clave").value.trim();
      const resultado = document.getElementById("resultado");

      resultado.style.display = "block";
      resultado.className = "resultado";
      resultado.innerHTML = "Consultando...";

      if (!id || !correo || !clave) {
        resultado.className = "resultado error";
        resultado.innerHTML = "Debe ingresar ID, correo electrónico y clave de acceso.";
        return;
      }

      const url = SCRIPT_URL +
        "?action=consultar" +
        "&id=" + encodeURIComponent(id) +
        "&correo=" + encodeURIComponent(correo) +
        "&clave=" + encodeURIComponent(clave);

      try {
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          resultado.className = "resultado error";
          resultado.innerHTML = datos.mensaje || "No se encontró el registro.";
          return;
        }

        const estado = normalizarEstado(datos.estado);

        resultado.className = "resultado exito";
        resultado.innerHTML = `
          <div class="trabajo-header">
            <h3>${datos.titulo || "Trabajo académico"}</h3>
            ${badgeEstado(estado)}
          </div>
          ${crearProgreso(estado)}
          <div class="dato"><strong>ID:</strong> ${datos.id || ""}</div>
          <div class="dato"><strong>Nombre:</strong> ${datos.nombre || ""}</div>
          <div class="dato"><strong>Correo:</strong> ${datos.correo || ""}</div>
          <div class="dato"><strong>Universidad:</strong> ${datos.universidad || ""}</div>
          <div class="dato"><strong>Nivel académico:</strong> ${datos.nivel || ""}</div>
          <div class="dato"><strong>Tipo de servicio:</strong> ${datos.tipoServicio || ""}</div>
          <div class="dato"><strong>Estado:</strong> ${estado}</div>
          <div class="dato"><strong>Última actualización:</strong> ${datos.ultimaActualizacion || ""}</div>
          <div class="dato"><strong>Observaciones:</strong> ${datos.observaciones || ""}</div>
          ${datos.linkDocs ? `<div class="dato"><strong>Google Docs:</strong> <a href="${datos.linkDocs}" target="_blank">Abrir documento</a></div>` : ""}
        `;
      } catch (error) {
        resultado.className = "resultado error";
        resultado.innerHTML = "No se pudo consultar. Revise la conexión o la implementación.";
      }
    }

    async function listarTrabajos() {
      const claveAdmin = document.getElementById("adminClave").value.trim();
      const resultadoAdmin = document.getElementById("resultadoAdmin");
      const listaTrabajos = document.getElementById("listaTrabajos");

      resultadoAdmin.style.display = "block";
      resultadoAdmin.className = "resultado";
      resultadoAdmin.innerHTML = "Cargando tesis...";
      listaTrabajos.innerHTML = "";

      if (!claveAdmin) {
        resultadoAdmin.className = "resultado error";
        resultadoAdmin.innerHTML = "Debe ingresar la clave de administrador.";
        return;
      }

      const url = SCRIPT_URL +
        "?action=listar_tesis" +
        "&admin=" + encodeURIComponent(claveAdmin) +
        "&clave_admin=" + encodeURIComponent(claveAdmin);

      try {
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          resultadoAdmin.className = "resultado error";
          resultadoAdmin.innerHTML = datos.mensaje || "No se pudieron cargar las tesis.";
          return;
        }

        trabajosCache = datos.tesis || datos.pendientes || [];
        resultadoAdmin.className = "resultado exito";
        resultadoAdmin.innerHTML = "Tesis cargadas: " + trabajosCache.length;
        pintarTrabajos();

      } catch (error) {
        resultadoAdmin.className = "resultado error";
        resultadoAdmin.innerHTML = "No se pudieron cargar las tesis.";
      }
    }

    function pintarTrabajos() {
      const listaTrabajos = document.getElementById("listaTrabajos");
      const filtroEstado = document.getElementById("filtroEstado").value;
      const filtroTexto = document.getElementById("filtroTexto").value.trim().toLowerCase();

      const filtrados = trabajosCache.filter(function(item) {
        const estado = normalizarEstado(item.estado);
        const texto = [item.id, item.nombre, item.correo, item.titulo, item.universidad].join(" ").toLowerCase();
        return (!filtroEstado || estado === filtroEstado) && (!filtroTexto || texto.indexOf(filtroTexto) !== -1);
      });

      if (filtrados.length === 0) {
        listaTrabajos.innerHTML = `<div class="resultado exito" style="display:block">No hay tesis con ese filtro.</div>`;
        return;
      }

      listaTrabajos.innerHTML = filtrados.map(function(item) {
        const idSeguro = String(item.id || "").replace(/'/g, "&#39;");
        const estado = normalizarEstado(item.estado);
        const autorizada = String(item.autorizada || "").toLowerCase() === "si";
        const puedeAutorizar = estado === "Aprobada para seguimiento" && !autorizada;

        return `
          <div class="trabajo" id="trabajo-${idSeguro}">
            <div class="trabajo-header">
              <h3>${item.nombre || "Sin nombre"}</h3>
              ${badgeEstado(estado)}
            </div>

            ${crearProgreso(estado)}

            <div class="dato"><strong>ID:</strong> ${item.id || ""}</div>
            <div class="dato"><strong>Correo:</strong> ${item.correo || ""}</div>
            <div class="dato"><strong>Universidad:</strong> ${item.universidad || ""}</div>
            <div class="dato"><strong>Nivel:</strong> ${item.nivel || ""}</div>
            <div class="dato"><strong>Servicio:</strong> ${item.tipoServicio || ""}</div>
            <div class="dato"><strong>Título:</strong> ${item.titulo || ""}</div>
            <div class="dato"><strong>Acceso autorizado:</strong> ${autorizada ? "Sí" : "No"}</div>

            <div class="grid-dos">
              <div>
                <label>Nuevo estado</label>
                <select id="estado-${idSeguro}">
                  ${ESTADOS.map(function(nombre) {
                    return `<option value="${nombre}" ${nombre === estado ? "selected" : ""}>${nombre}</option>`;
                  }).join("")}
                </select>
              </div>

              <div>
                <label>Notificar por correo</label>
                <select id="notificar-${idSeguro}">
                  <option value="No">No</option>
                  <option value="Si">Sí</option>
                </select>
              </div>
            </div>

            <label>Observaciones</label>
            <textarea id="observaciones-${idSeguro}" placeholder="Escriba observaciones para el estudiante">${item.observaciones || ""}</textarea>

            <div class="acciones">
              <button onclick="guardarEstado('${idSeguro}')">Guardar estado</button>
              <button class="verde" onclick="autorizarTrabajo('${idSeguro}')" ${puedeAutorizar ? "" : "disabled"}>Autorizar acceso</button>
            </div>

            ${!puedeAutorizar && !autorizada ? `<p>Para autorizar acceso, primero cambie el estado a <strong>Aprobada para seguimiento</strong>.</p>` : ""}
          </div>
        `;
      }).join("");
    }

    async function autorizarTrabajo(id) {
      const claveAdmin = document.getElementById("adminClave").value.trim();
      const resultadoAdmin = document.getElementById("resultadoAdmin");

      if (!confirm("¿Autorizar acceso del estudiante a esta tesis?")) return;

      resultadoAdmin.style.display = "block";
      resultadoAdmin.className = "resultado";
      resultadoAdmin.innerHTML = "Autorizando...";

      const url = SCRIPT_URL +
        "?action=autorizar_subida" +
        "&id=" + encodeURIComponent(id) +
        "&admin=" + encodeURIComponent(claveAdmin) +
        "&clave_admin=" + encodeURIComponent(claveAdmin);

      try {
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          resultadoAdmin.className = "resultado error";
          resultadoAdmin.innerHTML = datos.mensaje || "No se pudo autorizar.";
          return;
        }

        resultadoAdmin.className = "resultado exito";
        resultadoAdmin.innerHTML = "Acceso autorizado correctamente. Se envió el correo al estudiante.";
        listarTrabajos();
      } catch (error) {
        resultadoAdmin.className = "resultado error";
        resultadoAdmin.innerHTML = "No se pudo autorizar.";
      }
    }

    async function guardarEstado(id) {
      const claveAdmin = document.getElementById("adminClave").value.trim();
      const estado = document.getElementById("estado-" + id).value;
      const observaciones = document.getElementById("observaciones-" + id).value.trim();
      const notificar = document.getElementById("notificar-" + id).value;
      const resultadoAdmin = document.getElementById("resultadoAdmin");

      resultadoAdmin.style.display = "block";
      resultadoAdmin.className = "resultado";
      resultadoAdmin.innerHTML = "Guardando cambios...";

      const url = SCRIPT_URL +
        "?action=actualizar_estado" +
        "&id=" + encodeURIComponent(id) +
        "&estado=" + encodeURIComponent(estado) +
        "&observaciones=" + encodeURIComponent(observaciones) +
        "&notificar=" + encodeURIComponent(notificar) +
        "&admin=" + encodeURIComponent(claveAdmin) +
        "&clave_admin=" + encodeURIComponent(claveAdmin);

      try {
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          resultadoAdmin.className = "resultado error";
          resultadoAdmin.innerHTML = datos.mensaje || "No se pudo actualizar el estado.";
          return;
        }

        resultadoAdmin.className = "resultado exito";
        resultadoAdmin.innerHTML = "Estado actualizado correctamente.";
        listarTrabajos();
      } catch (error) {
        resultadoAdmin.className = "resultado error";
        resultadoAdmin.innerHTML = "No se pudo actualizar el estado.";
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key !== "Enter") {
        return;
      }

      const elemento = event.target;

      if (!elemento || !elemento.id) {
        return;
      }

      if (["idConsulta", "correoConsulta", "claveConsulta"].indexOf(elemento.id) !== -1) {
        event.preventDefault();
        consultarEstado();
      }

      if (elemento.id === "adminClave") {
        event.preventDefault();
        listarTrabajos();
      }
    });
  </script>
</body>
</html>
