<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta y Administración de Tesis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071426;
      color: #ffffff;
    }

    .contenedor {
      max-width: 820px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    h1, h2 {
      margin-bottom: 8px;
      color: #19d3e6;
    }

    p {
      line-height: 1.5;
      color: #d6e6f2;
    }

    .caja {
      background: #0d1f36;
      border: 1px solid #2f5c7c;
      border-radius: 8px;
      padding: 22px;
      margin-top: 22px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #3c6d91;
      background: #071426;
      color: #ffffff;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: 0;
      border-radius: 6px;
      background: #19d3e6;
      color: #00111f;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .boton-admin {
      background: #ffd166;
      color: #1d1600;
    }

    .resultado {
      margin-top: 22px;
      padding: 18px;
      border-radius: 8px;
      background: #06111f;
      border: 1px solid #2f5c7c;
      display: none;
    }

    .error {
      border-color: #ff6b6b;
      color: #ffd6d6;
    }

    .exito {
      border-color: #2dd881;
      color: #d9ffe9;
    }

    .dato {
      margin-bottom: 10px;
    }

    .dato strong {
      color: #19d3e6;
    }

    a {
      color: #19d3e6;
    }
  </style>
</head>

<body>
  <div class="contenedor">
    <h1>Consulta de estado de tesis</h1>
    <p>
      Ingrese su ID, correo electrónico y clave de acceso para consultar el estado de su trabajo académico.
    </p>

    <div class="caja">
      <h2>Estudiante</h2>

      <label for="id">ID de registro</label>
      <input id="id" type="text" placeholder="Ejemplo: TESIS-20260706091128" />

      <label for="correo">Correo electrónico</label>
      <input id="correo" type="email" placeholder="correo@ejemplo.com" />

      <label for="clave">Clave de acceso</label>
      <input id="clave" type="password" placeholder="Clave recibida por correo" />

      <button onclick="consultarEstado()">Consultar estado</button>

      <div id="resultado" class="resultado"></div>
    </div>

    <div class="caja">
      <h2>Administrador</h2>
      <p>
        Use esta sección para autorizar a un estudiante y generar su clave de acceso.
      </p>

      <label for="adminId">ID del estudiante</label>
      <input id="adminId" type="text" placeholder="Ejemplo: TESIS-20260706091128" />

      <label for="adminClave">Clave de administrador</label>
      <input id="adminClave" type="password" placeholder="Clave de administrador" />

      <button class="boton-admin" onclick="autorizarEstudiante()">Autorizar estudiante</button>

      <div id="resultadoAdmin" class="resultado"></div>
    </div>
  </div>
