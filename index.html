<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de Estado de Tesis</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071426;
      color: #ffffff;
    }

    .contenedor {
      max-width: 1060px;
      margin: 0 auto;
      padding: 32px 18px;
    }

    h1, h2, h3 {
      color: #19d3e6;
    }

    p {
      line-height: 1.5;
      color: #d6e6f2;
    }

    .caja {
      background: #0d1f36;
      border: 1px solid #2f5c7c;
      border-radius: 8px;
      padding: 22px;
      margin-top: 22px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .tab {
      padding: 13px;
      border: 1px solid #2f5c7c;
      border-radius: 6px;
      background: #071426;
      color: #ffffff;
      font-weight: bold;
      cursor: pointer;
    }

    .tab.activo {
      background: #19d3e6;
      color: #00111f;
      border-color: #19d3e6;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #3c6d91;
      background: #071426;
      color: #ffffff;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: 0;
      border-radius: 6px;
      background: #19d3e6;
      color: #00111f;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button.secundario {
      background: #ffd166;
      color: #1b1300;
    }

    button.verde {
      background: #3ddc97;
      color: #002015;
    }

    button.discreto {
      background: #12314f;
      color: #d6e6f2;
      border: 1px solid #2f5c7c;
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .cargador-global {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(3, 10, 20, 0.72);
      backdrop-filter: blur(3px);
    }

    .cargador-global.activo {
      display: flex;
    }

    .cargador-caja {
      min-width: 220px;
      padding: 28px 30px;
      border-radius: 8px;
      border: 1px solid #2f5c7c;
      background: #071426;
      text-align: center;
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    }

    .cargador-asterisco {
      display: block;
      color: #19d3e6;
      font-size: 66px;
      line-height: 1;
      text-shadow: 0 0 24px rgba(25, 211, 230, 0.8);
      animation: girarAsterisco 1.05s linear infinite;
    }

    .cargador-texto {
      margin-top: 10px;
      color: #d6e6f2;
      font-weight: bold;
    }

    @keyframes girarAsterisco {
      from { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.12); }
      to { transform: rotate(360deg) scale(1); }
    }

    .resultado {
      margin-top: 22px;
      padding: 18px;
      border-radius: 8px;
      background: #06111f;
      border: 1px solid #2f5c7c;
      display: none;
    }

    .error {
      border-color: #ff6b6b;
      color: #ffd6d6;
    }

    .exito {
      border-color: #3ddc97;
      color: #d8ffe9;
    }

    .dato {
      margin-bottom: 10px;
    }

    .dato strong {
      color: #19d3e6;
    }

    .trabajo {
      margin-top: 18px;
      padding: 18px;
      border: 1px solid #2f5c7c;
      border-radius: 8px;
      background: #071426;
    }

    .trabajo-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .estado-badge {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: #12314f;
      border: 1px solid #2f5c7c;
      color: #d6e6f2;
      font-weight: bold;
      font-size: 14px;
    }

    .estado-badge.alerta {
      background: #3b2b05;
      border-color: #ffd166;
      color: #ffe7a3;
    }

    .estado-badge.exito-badge {
      background: #06321f;
      border-color: #3ddc97;
      color: #d8ffe9;
    }

    .grid-dos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .acciones {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .oculto {
      display: none;
    }

    .filtros {
      display: block;
      margin-top: 16px;
    }

    .busqueda-admin {
      margin-top: 18px;
      margin-bottom: 16px;
      max-width: 520px;
    }

    .mensaje-trabajo {
      margin: 14px 0;
    }

    .filtro-estados {
      position: relative;
      display: grid;
      grid-template-columns: repeat(9, minmax(86px, 1fr));
      gap: 10px;
      margin-top: 8px;
      padding: 28px 10px 10px;
      border: 1px solid #203e5f;
      border-radius: 8px;
      background: #06111f;
      overflow-x: auto;
    }

    .filtro-estados::before {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      top: 16px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, #19d3e6, #3ddc97);
      box-shadow: 0 0 12px rgba(25, 211, 230, 0.45);
    }

    .filtro-chip {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 86px;
      padding: 8px 4px 6px;
      border: 0;
      background: transparent;
      color: #d6e6f2;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      line-height: 1.15;
    }

    .filtro-chip::before {
      content: "";
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #12314f;
      border: 2px solid #2f5c7c;
      box-shadow: 0 0 0 rgba(25, 211, 230, 0);
    }

    .filtro-chip.activo {
      color: #ffffff;
    }

    .filtro-chip.activo::before {
      background: #3ddc97;
      border-color: #3ddc97;
      box-shadow: 0 0 16px rgba(61, 220, 151, 0.75);
    }

    .filtro-chip.papelera::before {
      background: #2b3442;
      border-color: #8fa6c6;
    }

    .filtro-chip.papelera.activo::before {
      background: #ffd166;
      border-color: #ffd166;
      box-shadow: 0 0 16px rgba(255, 209, 102, 0.7);
    }

    .progreso {
      margin: 18px 0 20px;
      padding: 16px;
      border-radius: 8px;
      background: #06111f;
      border: 1px solid #203e5f;
    }

    .progreso-linea {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      align-items: start;
    }

    .paso {
      position: relative;
      text-align: center;
      color: #8fa6c6;
      font-size: 12px;
      line-height: 1.25;
    }

    .punto {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      margin: 0 auto 8px;
      background: #12314f;
      border: 2px solid #2f5c7c;
      box-sizing: border-box;
    }

    .paso.hecho .punto {
      background: #19d3e6;
      border-color: #19d3e6;
      box-shadow: 0 0 14px rgba(25, 211, 230, .45);
    }

    .paso.actual .punto {
      background: #ffd166;
      border-color: #ffd166;
      box-shadow: 0 0 16px rgba(255, 209, 102, .55);
    }

    .paso.final .punto {
      background: #3ddc97;
      border-color: #3ddc97;
      box-shadow: 0 0 16px rgba(61, 220, 151, .55);
    }

    .paso.hecho,
    .paso.actual,
    .paso.final {
      color: #ffffff;
      font-weight: bold;
    }

    .barra-avance {
      height: 8px;
      background: #12314f;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid #2f5c7c;
    }

    .barra-avance span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #19d3e6, #3ddc97);
      width: 0%;
    }

    a {
      color: #19d3e6;
    }

    @media (max-width: 820px) {
      .tabs, .grid-dos, .acciones, .filtros {
        grid-template-columns: 1fr;
      }

      .progreso-linea {
        grid-template-columns: 1fr;
        text-align: left;
      }

      .paso {
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
      }

      .punto {
        margin: 0;
        flex: 0 0 auto;
      }
    }
  </style>
</head>

<body>
  <div id="cargadorGlobal" class="cargador-global">
    <div class="cargador-caja">
      <span class="cargador-asterisco">*</span>
      <div id="cargadorTexto" class="cargador-texto">Cargando...</div>
    </div>
  </div>

  <div class="contenedor">
    <h1>Consulta de estado de tesis</h1>
    <p>Seleccione el tipo de acceso para continuar.</p>

    <div class="tabs">
      <button type="button" class="tab activo" id="tabEstudiante" onclick="mostrarAcceso('estudiante')">Estudiante</button>
      <button type="button" class="tab" id="tabAdmin" onclick="mostrarAcceso('admin')">Administrador</button>
    </div>

    <div id="panelEstudiante" class="caja">
      <h2>Acceso estudiante</h2>
      <p>Ingrese su ID, correo electrónico y clave de acceso.</p>

      <label for="id">ID de registro</label>
      <input id="id" type="text" placeholder="Ejemplo: TESIS-20260706091128" />

      <label for="correo">Correo electrónico</label>
      <input id="correo" type="email" placeholder="correo@ejemplo.com" />

      <label for="clave">Clave de acceso</label>
      <input id="clave" type="password" placeholder="Clave recibida por correo" />

      <button type="button" onclick="consultarEstado()">Consultar estado</button>

      <div id="resultado" class="resultado"></div>
    </div>

    <div id="panelAdmin" class="caja oculto">
      <h2>Panel de gestión de tesis</h2>

      <div id="accesoAdmin">
      <label for="adminClave">Clave de administrador</label>
      <input id="adminClave" type="password" placeholder="Clave de administrador" />

      <button type="button" class="secundario" onclick="listarTrabajos()">Ingresar</button>
      </div>

      <div id="herramientasAdmin" class="oculto">
      <div class="busqueda-admin">
        <label for="filtroTexto">Buscar tesis</label>
        <input id="filtroTexto" type="text" placeholder="Nombre, correo, título o ID" oninput="pintarTrabajos()" />
      </div>

      <div class="filtros">
        <div>
          <label>Filtrar por estado</label>
          <div id="filtroEstadoBotones" class="filtro-estados"></div>
        </div>
      </div>
      </div>

      <div id="resultadoAdmin" class="resultado"></div>
      <div id="listaTrabajos"></div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzkFB4Q7q2R7UBsze7T5K9h-9rpaasMjVlV6iq4S3T-Kx-Kxd8ckeLckEO01mTK7qMKEw/exec";

    const ESTADOS = [
      "Solicitud recibida",
      "En evaluación inicial",
      "Información incompleta",
      "Aprobada para seguimiento",
      "En revisión",
      "Con observaciones",
      "En espera del estudiante",
      "Finalizado"
    ];

    const ESTADO_EQUIVALENTE = {
      "Recibido": "Solicitud recibida",
      "En revision": "En revisión",
      "En revisiÃ³n": "En revisión"
    };

    let trabajosCache = [];
    let filtroEstadoActual = "";
    let mensajesTrabajo = {};

    function mostrarCargador(texto) {
      const cargador = document.getElementById("cargadorGlobal");
      const cargadorTexto = document.getElementById("cargadorTexto");

      if (cargadorTexto) {
        cargadorTexto.innerHTML = texto || "Cargando...";
      }

      if (cargador) {
        cargador.classList.add("activo");
      }
    }

    function ocultarCargador() {
      const cargador = document.getElementById("cargadorGlobal");

      if (cargador) {
        cargador.classList.remove("activo");
      }
    }

    function ocultarAccesoAdmin() {
      const accesoAdmin = document.getElementById("accesoAdmin");
      const adminClave = document.getElementById("adminClave");

      if (adminClave) {
        adminClave.value = "";
      }

      if (accesoAdmin) {
        accesoAdmin.classList.add("oculto");
        accesoAdmin.style.display = "none";
      }
    }

    function normalizarEstado(estado) {
      const limpio = String(estado || "").trim();
      return ESTADO_EQUIVALENTE[limpio] || limpio || "Solicitud recibida";
    }

    function pintarBotonesEstado() {
      const contenedor = document.getElementById("filtroEstadoBotones");
      if (!contenedor) return;

      const opciones = ESTADOS.concat(["Todos"]);

      contenedor.innerHTML = opciones.map(function(nombre) {
        const valor = nombre === "Todos" ? "" : nombre;
        const activo = valor === filtroEstadoActual ? " activo" : "";
        const etiqueta = nombre === "Finalizado" ? "Papelera / Finalizados" : nombre;
        const clasePapelera = nombre === "Finalizado" ? " papelera" : "";

        return `
          <button type="button" class="filtro-chip${activo}${clasePapelera}" onclick="filtrarPorEstado('${valor.replace(/'/g, "\\'")}')">
            ${etiqueta}
          </button>
        `;
      }).join("");
    }

    function filtrarPorEstado(estado) {
      filtroEstadoActual = estado;
      pintarBotonesEstado();
      pintarTrabajos();
    }

    function mostrarMensajeTrabajo(id, tipo, texto) {
      mensajesTrabajo[String(id || "")] = {
        tipo: tipo,
        texto: texto
      };

      const mensaje = document.getElementById("mensaje-" + id);
      if (!mensaje) return;

      mensaje.style.display = "block";
      mensaje.className = "resultado mensaje-trabajo " + tipo;
      mensaje.innerHTML = texto;
    }

    function indiceEstado(estado) {
      const estadoNormal = normalizarEstado(estado);
      const idx = ESTADOS.indexOf(estadoNormal);
      return idx >= 0 ? idx : 0;
    }

    function crearProgreso(estado) {
      const idx = indiceEstado(estado);
      const porcentaje = Math.round((idx / (ESTADOS.length - 1)) * 100);

      return `
        <div class="progreso">
          <div class="barra-avance"><span style="width:${porcentaje}%"></span></div>
          <div class="progreso-linea">
            ${ESTADOS.map(function(nombre, i) {
              let clase = "paso";
              if (i < idx) clase += " hecho";
              if (i === idx) clase += nombre === "Finalizado" ? " final" : " actual";
              return `<div class="${clase}"><div class="punto"></div><div>${nombre}</div></div>`;
            }).join("")}
          </div>
        </div>
      `;
    }

    function badgeEstado(estado) {
      const estadoNormal = normalizarEstado(estado);
      let clase = "estado-badge";

      if (estadoNormal === "Información incompleta" || estadoNormal === "En espera del estudiante" || estadoNormal === "Con observaciones") {
        clase += " alerta";
      }

      if (estadoNormal === "Finalizado") {
        clase += " exito-badge";
      }

      return `<span class="${clase}">${estadoNormal}</span>`;
    }

    function mostrarAcceso(tipo) {
      document.getElementById("panelEstudiante").classList.toggle("oculto", tipo !== "estudiante");
      document.getElementById("panelAdmin").classList.toggle("oculto", tipo !== "admin");
      document.getElementById("tabEstudiante").classList.toggle("activo", tipo === "estudiante");
      document.getElementById("tabAdmin").classList.toggle("activo", tipo === "admin");
    }

    async function consultarEstado() {
      const id = document.getElementById("id").value.trim();
      const correo = document.getElementById("correo").value.trim();
      const clave = document.getElementById("clave").value.trim();
      const resultado = document.getElementById("resultado");

      resultado.style.display = "block";
      resultado.className = "resultado";
      resultado.innerHTML = "Consultando...";

      if (!id || !correo || !clave) {
        resultado.className = "resultado error";
        resultado.innerHTML = "Debe ingresar ID, correo electrónico y clave de acceso.";
        return;
      }

      const url = SCRIPT_URL +
        "?action=consultar" +
        "&id=" + encodeURIComponent(id) +
        "&correo=" + encodeURIComponent(correo) +
        "&clave=" + encodeURIComponent(clave);

      try {
        mostrarCargador("Consultando...");
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          resultado.className = "resultado error";
          resultado.innerHTML = datos.mensaje || "No se encontró el registro.";
          return;
        }

        const estado = normalizarEstado(datos.estado);

        resultado.className = "resultado exito";
        resultado.innerHTML = `
          <div class="trabajo-header">
            <h3>${datos.titulo || "Trabajo académico"}</h3>
            ${badgeEstado(estado)}
          </div>
          ${crearProgreso(estado)}
          <div class="dato"><strong>ID:</strong> ${datos.id || ""}</div>
          <div class="dato"><strong>Nombre:</strong> ${datos.nombre || ""}</div>
          <div class="dato"><strong>Correo:</strong> ${datos.correo || ""}</div>
          <div class="dato"><strong>Universidad:</strong> ${datos.universidad || ""}</div>
          <div class="dato"><strong>Nivel académico:</strong> ${datos.nivel || ""}</div>
          <div class="dato"><strong>Tipo de servicio:</strong> ${datos.tipoServicio || ""}</div>
          <div class="dato"><strong>Estado:</strong> ${estado}</div>
          <div class="dato"><strong>Última actualización:</strong> ${datos.ultimaActualizacion || ""}</div>
          <div class="dato"><strong>Observaciones:</strong> ${datos.observaciones || ""}</div>
          ${datos.linkDocs ? `<div class="dato"><strong>Google Docs:</strong> <a href="${datos.linkDocs}" target="_blank">Abrir documento</a></div>` : ""}
        `;
      } catch (error) {
        resultado.className = "resultado error";
        resultado.innerHTML = "No se pudo consultar. Revise la conexión o la implementación.";
      } finally {
        ocultarCargador();
      }
    }

    async function listarTrabajos() {
      const claveAdmin = document.getElementById("adminClave").value.trim();
      const resultadoAdmin = document.getElementById("resultadoAdmin");
      const listaTrabajos = document.getElementById("listaTrabajos");
      const herramientasAdmin = document.getElementById("herramientasAdmin");
      const accesoAdmin = document.getElementById("accesoAdmin");

      resultadoAdmin.style.display = "block";
      resultadoAdmin.className = "resultado";
      resultadoAdmin.innerHTML = "Cargando tesis...";
      listaTrabajos.innerHTML = "";
      herramientasAdmin.classList.add("oculto");

      if (!claveAdmin) {
        resultadoAdmin.className = "resultado error";
        resultadoAdmin.innerHTML = "Debe ingresar la clave de administrador.";
        return;
      }

      const url = SCRIPT_URL +
        "?action=listar_tesis" +
        "&admin=" + encodeURIComponent(claveAdmin) +
        "&clave_admin=" + encodeURIComponent(claveAdmin);

      try {
        mostrarCargador("Cargando tesis...");
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          resultadoAdmin.className = "resultado error";
          resultadoAdmin.innerHTML = datos.mensaje || "No se pudieron cargar las tesis.";
          herramientasAdmin.classList.add("oculto");
          return;
        }

        trabajosCache = datos.tesis || datos.pendientes || [];
        const activas = trabajosCache.filter(function(item) {
          return normalizarEstado(item.estado) !== "Finalizado";
        }).length;
        ocultarAccesoAdmin();
        herramientasAdmin.classList.remove("oculto");
        resultadoAdmin.className = "resultado exito";
        resultadoAdmin.innerHTML = "Tesis activas: " + activas;
        pintarTrabajos();

      } catch (error) {
        resultadoAdmin.className = "resultado error";
        resultadoAdmin.innerHTML = "No se pudieron cargar las tesis.";
        herramientasAdmin.classList.add("oculto");
      } finally {
        ocultarCargador();
      }
    }

    function pintarTrabajos() {
      const listaTrabajos = document.getElementById("listaTrabajos");
      const filtroEstado = filtroEstadoActual;
      const filtroTexto = document.getElementById("filtroTexto").value.trim().toLowerCase();

      const filtrados = trabajosCache.filter(function(item) {
        const estado = normalizarEstado(item.estado);
        const texto = [item.id, item.nombre, item.correo, item.titulo, item.universidad].join(" ").toLowerCase();
        const coincideTexto = !filtroTexto || texto.indexOf(filtroTexto) !== -1;

        if (!coincideTexto) {
          return false;
        }

        if (!filtroEstado) {
          return estado !== "Finalizado";
        }

        return estado === filtroEstado;
      });

      if (filtrados.length === 0) {
        listaTrabajos.innerHTML = `<div class="resultado exito" style="display:block">No hay tesis con ese filtro.</div>`;
        return;
      }

      listaTrabajos.innerHTML = filtrados.map(function(item) {
        const idSeguro = String(item.id || "").replace(/'/g, "&#39;");
        const estado = normalizarEstado(item.estado);
        const autorizada = String(item.autorizada || "").toLowerCase() === "si";
        const puedeAutorizar = estado === "Aprobada para seguimiento" && !autorizada;
        const mensaje = mensajesTrabajo[String(item.id || "")];

        return `
          <div class="trabajo" id="trabajo-${idSeguro}">
            <div class="trabajo-header">
              <h3>${item.nombre || "Sin nombre"}</h3>
              ${badgeEstado(estado)}
            </div>

            ${crearProgreso(estado)}

            <div id="mensaje-${idSeguro}" class="resultado mensaje-trabajo ${mensaje ? mensaje.tipo : ""}" style="${mensaje ? "display:block" : ""}">
              ${mensaje ? mensaje.texto : ""}
            </div>

            <div class="dato"><strong>ID:</strong> ${item.id || ""}</div>
            <div class="dato"><strong>Correo:</strong> ${item.correo || ""}</div>
            <div class="dato"><strong>Universidad:</strong> ${item.universidad || ""}</div>
            <div class="dato"><strong>Nivel:</strong> ${item.nivel || ""}</div>
            <div class="dato"><strong>Servicio:</strong> ${item.tipoServicio || ""}</div>
            <div class="dato"><strong>Título:</strong> ${item.titulo || ""}</div>
            <div class="dato"><strong>Acceso autorizado:</strong> ${autorizada ? "Sí" : "No"}</div>

            <div class="grid-dos">
              <div>
                <label>Nuevo estado</label>
                <select id="estado-${idSeguro}">
                  ${ESTADOS.map(function(nombre) {
                    return `<option value="${nombre}" ${nombre === estado ? "selected" : ""}>${nombre}</option>`;
                  }).join("")}
                </select>
              </div>

              <div>
                <label>Notificar por correo</label>
                <select id="notificar-${idSeguro}">
                  <option value="No">No</option>
                  <option value="Si">Sí</option>
                </select>
              </div>
            </div>

            <label>Observaciones</label>
            <textarea id="observaciones-${idSeguro}" placeholder="Escriba observaciones para el estudiante">${item.observaciones || ""}</textarea>

            <div class="acciones">
              <button type="button" onclick="guardarEstado('${idSeguro}')">Guardar estado</button>
              <button type="button" class="verde" onclick="autorizarTrabajo('${idSeguro}')" ${puedeAutorizar ? "" : "disabled"}>Autorizar acceso</button>
            </div>

            ${!puedeAutorizar && !autorizada ? `<p>Para autorizar acceso, primero cambie el estado a <strong>Aprobada para seguimiento</strong>.</p>` : ""}
          </div>
        `;
      }).join("");
    }

    async function autorizarTrabajo(id) {
      const claveAdmin = document.getElementById("adminClave").value.trim();
      const resultadoAdmin = document.getElementById("resultadoAdmin");

      if (!confirm("¿Autorizar acceso del estudiante a esta tesis?")) return;

      resultadoAdmin.style.display = "none";
      mostrarMensajeTrabajo(id, "", "Autorizando acceso...");

      const url = SCRIPT_URL +
        "?action=autorizar_subida" +
        "&id=" + encodeURIComponent(id) +
        "&admin=" + encodeURIComponent(claveAdmin) +
        "&clave_admin=" + encodeURIComponent(claveAdmin);

      try {
        mostrarCargador("Autorizando...");
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          mostrarMensajeTrabajo(id, "error", datos.mensaje || "No se pudo autorizar.");
          return;
        }

        const indice = trabajosCache.findIndex(function(item) {
          return String(item.id || "") === String(id || "");
        });

        if (indice >= 0) {
          trabajosCache[indice].autorizada = "Si";
        }

        mensajesTrabajo[String(id || "")] = {
          tipo: "exito",
          texto: "Acceso autorizado correctamente. Se envió el correo al estudiante."
        };

        pintarTrabajos();
      } catch (error) {
        mostrarMensajeTrabajo(id, "error", "No se pudo autorizar.");
      } finally {
        ocultarCargador();
      }
    }

    async function guardarEstado(id) {
      const claveAdmin = document.getElementById("adminClave").value.trim();
      const estado = document.getElementById("estado-" + id).value;
      const observaciones = document.getElementById("observaciones-" + id).value.trim();
      const notificar = document.getElementById("notificar-" + id).value;
      const resultadoAdmin = document.getElementById("resultadoAdmin");

      resultadoAdmin.style.display = "none";
      mostrarMensajeTrabajo(id, "", "Guardando cambios...");

      const url = SCRIPT_URL +
        "?action=actualizar_estado" +
        "&id=" + encodeURIComponent(id) +
        "&estado=" + encodeURIComponent(estado) +
        "&observaciones=" + encodeURIComponent(observaciones) +
        "&notificar=" + encodeURIComponent(notificar) +
        "&admin=" + encodeURIComponent(claveAdmin) +
        "&clave_admin=" + encodeURIComponent(claveAdmin);

      try {
        mostrarCargador("Guardando...");
        const respuesta = await fetch(url);
        const datos = await respuesta.json();

        if (!datos.ok) {
          mostrarMensajeTrabajo(id, "error", datos.mensaje || "No se pudo actualizar el estado.");
          return;
        }

        const indice = trabajosCache.findIndex(function(item) {
          return String(item.id || "") === String(id || "");
        });

        if (indice >= 0) {
          trabajosCache[indice].estado = estado;
          trabajosCache[indice].observaciones = observaciones;
          trabajosCache[indice].ultimaActualizacion = new Date().toLocaleString("es-GT");
          if (notificar === "Si") {
            trabajosCache[indice].notificado = "Si";
          }
        }

        if (filtroEstadoActual && filtroEstadoActual !== estado) {
          filtroEstadoActual = "";
          pintarBotonesEstado();
        }

        mensajesTrabajo[String(id || "")] = {
          tipo: "exito",
          texto: "Estado actualizado correctamente."
        };
        pintarTrabajos();
      } catch (error) {
        mostrarMensajeTrabajo(id, "error", "No se pudo actualizar el estado.");
      } finally {
        ocultarCargador();
      }
    }

    document.addEventListener("keydown", function(event) {
      if (event.key !== "Enter") {
        return;
      }

      const elemento = event.target;

      if (!elemento || !elemento.id) {
        return;
      }

      if (["idConsulta", "correoConsulta", "claveConsulta"].indexOf(elemento.id) !== -1) {
        event.preventDefault();
        consultarEstado();
      }

      if (elemento.id === "adminClave") {
        event.preventDefault();
        listarTrabajos();
      }
    });

    pintarBotonesEstado();
  </script>
</body>
</html>
